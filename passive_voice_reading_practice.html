<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>受動態 音読練習</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#ffffff; --ink:#172033; --muted:#687386;
      --main:#7a4ff3; --soft:#f1ecff; --ok:#10a36f; --line:#dce3ef;
      --note:#fff8e7; --noteLine:#f1dfac;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink);}
    header{padding:22px 16px 14px; text-align:center;}
    h1{margin:0 0 6px; font-size:clamp(24px,4vw,38px);}
    .sub{color:var(--muted); font-size:15px;}
    main{max-width:980px; margin:0 auto; padding:0 14px 28px;}
    .panel{background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:0 10px 26px rgba(26,42,68,.08); padding:18px;}
    .toprow{display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:14px;}
    .badge{background:var(--soft); color:var(--main); font-weight:800; padding:8px 12px; border-radius:999px;}
    .progressWrap{height:12px; background:#edf1f7; border-radius:999px; overflow:hidden; flex:1; min-width:180px;}
    .progress{height:100%; width:0%; background:var(--main); transition:.25s;}
    .sentenceBox{border:2px solid var(--line); border-radius:18px; padding:20px; background:linear-gradient(180deg,#fff,#fbfdff); min-height:275px; display:flex; flex-direction:column; justify-content:center;}
    .label{color:var(--muted); font-size:14px; font-weight:800; margin-bottom:8px;}
    .en{font-family:Georgia,"Times New Roman",serif; font-size:clamp(27px,4.1vw,46px); line-height:1.35; font-weight:700; margin-bottom:18px;}
    .ja{font-size:clamp(17px,2.3vw,25px); line-height:1.55; background:var(--note); border:1px solid var(--noteLine); border-radius:14px; padding:13px;}
    .point{font-size:15px; line-height:1.45; color:var(--muted); margin-top:10px; padding:10px 12px; background:#f7f9fc; border:1px solid var(--line); border-radius:12px;}
    .ja.hidden,.point.hidden{visibility:hidden;}
    .buttons{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px;}
    button, select{font-size:16px; border:none; border-radius:14px; padding:13px 12px; font-weight:800; cursor:pointer;}
    button{background:#eef3fb; color:var(--ink);}
    button.primary{background:var(--main); color:white;}
    button.green{background:var(--ok); color:white;}
    button:active{transform:translateY(1px)}
    .settings{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; color:var(--muted);}
    select{background:white; border:1px solid var(--line); color:var(--ink); min-width:220px; font-weight:600;}
    .list{margin-top:18px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:8px;}
    .item{border:1px solid var(--line); border-radius:12px; background:white; padding:10px; cursor:pointer; font-size:14px; line-height:1.35;}
    .item.active{border-color:var(--main); background:var(--soft);}
    .itemDone{color:var(--ok); font-weight:900; margin-right:4px;}
    .small{font-size:13px; color:var(--muted); margin-top:10px;}
    @media(max-width:680px){.buttons{grid-template-columns:repeat(2,1fr)} .sentenceBox{min-height:340px}}
  </style>
</head>
<body>
  <header>
    <h1>受動態 音読練習</h1>
    <div class="sub">一文ずつ表示・和訳つき・英文読み上げ</div>
  </header>
  <main>
    <section class="panel">
      <div class="toprow">
        <div class="badge" id="counter">1 / 24</div>
        <div class="progressWrap"><div class="progress" id="progress"></div></div>
      </div>

      <div class="sentenceBox">
        <div class="label" id="typeLabel">問題</div>
        <div class="en" id="english"></div>
        <div class="ja" id="japanese"></div>
        <div class="point" id="point"></div>
      </div>

      <div class="buttons">
        <button id="prevBtn">← 前へ</button>
        <button class="primary" id="speakBtn">▶ 音読</button>
        <button class="green" id="repeatBtn">🔁 3回</button>
        <button id="nextBtn">次へ →</button>
      </div>

      <div class="buttons">
        <button id="slowBtn">🐢 ゆっくり</button>
        <button id="hideJaBtn">和訳を隠す</button>
        <button id="doneBtn">できた ✓</button>
        <button id="shuffleBtn">ランダム</button>
      </div>

      <div class="settings">
        <label>Voice: <select id="voiceSelect"></select></label>
        <label>Speed: <select id="rateSelect">
          <option value="0.7">0.7 ゆっくり</option>
          <option value="0.85" selected>0.85 少しゆっくり</option>
          <option value="1">1.0 普通</option>
        </select></label>
      </div>
      <div class="small">スペースキー：音読　← →：前後移動</div>
    </section>
    <div class="list" id="list"></div>
  </main>

<script>
const sentences = [
  {type:'例題 012', en:'This theory is supported by a lot of scientists.', ja:'この理論は多くの科学者によって支持されています。', point:'be動詞 + 過去分詞：is supported'},
  {type:'例題 013', en:'The newborn baby was named John after its grandfather.', ja:'その生まれたばかりの赤ちゃんは、祖父にちなんでジョンと名付けられました。', point:'過去の受け身：was named'},
  {type:'例題 014', en:'I was spoken to by some tourists on my way home.', ja:'私は帰宅途中に何人かの観光客に話しかけられました。', point:'句動詞の受け身：was spoken to'},
  {type:'例題 015', en:'A general election will be held next month.', ja:'総選挙が来月行われます。', point:'未来の受け身：will be held'},
  {type:'例題 016', en:"You can't drive here because the road is being repaired now.", ja:'道路が今修理されているので、ここでは運転できません。', point:'進行形の受け身：is being repaired'},
  {type:'例題 017', en:'The director has been awarded the Oscar several times.', ja:'その監督は何度かオスカーを授与されています。', point:'現在完了の受け身：has been awarded'},
  {type:'例題 018', en:'He is said to be the model for the main character in the novel.', ja:'彼はその小説の主人公のモデルだと言われています。', point:'be said to do：〜すると言われている'},
  {type:'例題 019', en:'Ms. Smith is known for the study of Japanese culture.', ja:'スミスさんは日本文化の研究で知られています。', point:'be known for：〜で知られている'},
  {type:'問題 1', en:'The play Romeo and Juliet was written over 400 years ago.', ja:'劇「ロミオとジュリエット」は400年以上前に書かれました。', point:'was written = 書かれた'},
  {type:'問題 2', en:'The sun was hidden by the clouds.', ja:'太陽は雲に隠されていました。', point:'by the clouds = 雲によって'},
  {type:'問題 3', en:'This stone is called soapstone because it feels like soap.', ja:'この石は石けんのような感じがするので、ソープストーンと呼ばれています。', point:'is called = 〜と呼ばれている'},
  {type:'問題 4', en:'I was spoken to by a stranger in the shopping mall.', ja:'私はショッピングモールで見知らぬ人に話しかけられました。', point:'speak to の受け身：be spoken to'},
  {type:'問題 5', en:'The room should be kept clean at all times.', ja:'その部屋は常に清潔に保たれるべきです。', point:'助動詞 + be + 過去分詞：should be kept'},
  {type:'問題 6', en:'When I came to this city a year ago, the station was still being built.', ja:'私が1年前にこの町に来たとき、その駅はまだ建設中でした。', point:'過去進行形の受け身：was being built'},
  {type:'問題 7', en:'Michael has been selected as the Most Valuable Player three times.', ja:'マイケルは最優秀選手に3回選ばれています。', point:'現在完了の受け身：has been selected'},
  {type:'問題 8', en:'He is often said to be the best soccer player in Japan.', ja:'彼はよく日本で最高のサッカー選手だと言われています。', point:'is often said to be：よく〜だと言われる'},
  {type:'問題 9', en:'It is said that Tokyo is a safe city.', ja:'東京は安全な都市だと言われています。', point:'It is said that ...：〜だと言われている'},
  {type:'問題 10', en:'Kyoto is known for its beautiful, old temples and shrines.', ja:'京都は美しく古い寺や神社で知られています。', point:'be known for：〜で知られている'},
  {type:'問題 11', en:'We were running in the park and were caught in the rain.', ja:'私たちは公園で走っていて、雨に降られました。', point:'be caught in the rain：雨に降られる'},
  {type:'問題 12', en:'Robert is interested in Japanese popular culture such as manga and anime.', ja:'ロバートは漫画やアニメなどの日本の大衆文化に興味があります。', point:'be interested in：〜に興味がある'},
  {type:'Writing 1', en:'Owls can be seen at this cafe.', ja:'このカフェではフクロウを見ることができます。', point:'can be seen = 見られる / 見ることができる'},
  {type:'Writing 2', en:'A new building is being constructed on campus.', ja:'キャンパスに新しい建物が建設されています。', point:'is being constructed = 建設されているところだ'},
  {type:'Writing 3', en:'This letter has just been delivered.', ja:'この手紙はちょうど配達されたところです。', point:'has just been delivered = ちょうど配達された'},
  {type:'まとめ', en:'Passive voice is made with be and the past participle.', ja:'受動態は be動詞 と 過去分詞 で作ります。', point:'基本形：be + 過去分詞'}
];

let order = sentences.map((_,i)=>i);
let pos = 0;
let done = new Set(JSON.parse(localStorage.getItem('passiveVoiceDone')||'[]'));
let voices = [];

const $ = id => document.getElementById(id);
function saveDone(){ localStorage.setItem('passiveVoiceDone', JSON.stringify([...done])); }
function currentIndex(){ return order[pos]; }
function render(){
  const i = currentIndex(); const s = sentences[i];
  $('counter').textContent = `${pos+1} / ${sentences.length}`;
  $('progress').style.width = `${((pos+1)/sentences.length)*100}%`;
  $('typeLabel').textContent = s.type;
  $('english').textContent = s.en;
  $('japanese').textContent = s.ja;
  $('point').textContent = s.point || '';
  document.querySelectorAll('.item').forEach((el,k)=>{
    el.classList.toggle('active', k===pos);
    const idx = order[k];
    el.innerHTML = `${done.has(idx)?'<span class="itemDone">✓</span>':''}${sentences[idx].type}: ${sentences[idx].en}`;
  });
}
function buildList(){
  const list = $('list'); list.innerHTML='';
  order.forEach((idx,k)=>{
    const div = document.createElement('div'); div.className='item';
    div.onclick = ()=>{pos=k; render(); window.scrollTo({top:0,behavior:'smooth'});};
    list.appendChild(div);
  });
  render();
}
function chooseDefaultVoice(){
  const preferred = voices.findIndex(v => /female|woman|samantha|victoria|zira|susan|karen|serena|google us english/i.test(v.name));
  if(preferred >= 0) $('voiceSelect').value = preferred;
}
function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v=>v.lang && v.lang.toLowerCase().startsWith('en'));
  const sel = $('voiceSelect');
  const current = sel.value;
  sel.innerHTML='';
  voices.forEach((v,i)=>{
    const opt=document.createElement('option'); opt.value=i; opt.textContent=`${v.name} (${v.lang})`; sel.appendChild(opt);
  });
  if(current && voices[Number(current)]) sel.value = current; else chooseDefaultVoice();
}
function speak(rateOverride=null){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(sentences[currentIndex()].en);
  const vi = Number($('voiceSelect').value || 0);
  if(voices[vi]) u.voice = voices[vi];
  u.lang = voices[vi]?.lang || 'en-US';
  u.rate = rateOverride ?? Number($('rateSelect').value);
  u.pitch = 1;
  speechSynthesis.speak(u);
}
async function repeat(times=3){
  speechSynthesis.cancel();
  for(let i=0;i<times;i++){
    await new Promise(resolve=>{
      const u = new SpeechSynthesisUtterance(sentences[currentIndex()].en);
      const vi = Number($('voiceSelect').value || 0);
      if(voices[vi]) u.voice = voices[vi];
      u.lang = voices[vi]?.lang || 'en-US';
      u.rate = Number($('rateSelect').value);
      u.onend = ()=>setTimeout(resolve, 700);
      speechSynthesis.speak(u);
    });
  }
}
$('prevBtn').onclick=()=>{pos=(pos-1+order.length)%order.length; render();};
$('nextBtn').onclick=()=>{pos=(pos+1)%order.length; render();};
$('speakBtn').onclick=()=>speak();
$('slowBtn').onclick=()=>speak(0.65);
$('repeatBtn').onclick=()=>repeat(3);
$('hideJaBtn').onclick=()=>{
  $('japanese').classList.toggle('hidden');
  $('point').classList.toggle('hidden');
  $('hideJaBtn').textContent = $('japanese').classList.contains('hidden') ? '和訳を表示' : '和訳を隠す';
};
$('doneBtn').onclick=()=>{ done.add(currentIndex()); saveDone(); render(); };
$('shuffleBtn').onclick=()=>{
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]];}
  pos=0; buildList();
};
document.addEventListener('keydown', e=>{
  if(e.code==='Space'){e.preventDefault(); speak();}
  if(e.key==='ArrowRight') $('nextBtn').click();
  if(e.key==='ArrowLeft') $('prevBtn').click();
});
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;
buildList();
</script>
</body>
</html>
