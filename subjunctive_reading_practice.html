<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>仮定法 音読練習</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#ffffff; --ink:#172033; --muted:#687386;
      --main:#2f6fed; --soft:#eaf1ff; --ok:#10a36f; --line:#dce3ef;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink);}
    header{padding:22px 16px 14px; text-align:center;}
    h1{margin:0 0 6px; font-size:clamp(24px,4vw,38px);}
    .sub{color:var(--muted); font-size:15px;}
    main{max-width:980px; margin:0 auto; padding:0 14px 28px;}
    .panel{background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:0 10px 26px rgba(26,42,68,.08); padding:18px;}
    .toprow{display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:14px;}
    .badge{background:var(--soft); color:var(--main); font-weight:800; padding:8px 12px; border-radius:999px;}
    .progressWrap{height:12px; background:#edf1f7; border-radius:999px; overflow:hidden; flex:1; min-width:180px;}
    .progress{height:100%; width:0%; background:var(--main); transition:.25s;}
    .sentenceBox{border:2px solid var(--line); border-radius:18px; padding:20px; background:linear-gradient(180deg,#fff,#fbfdff); min-height:250px; display:flex; flex-direction:column; justify-content:center;}
    .label{color:var(--muted); font-size:14px; font-weight:700; margin-bottom:8px;}
    .en{font-family:Georgia,"Times New Roman",serif; font-size:clamp(28px,4.2vw,48px); line-height:1.35; font-weight:700; margin-bottom:22px;}
    .ja{font-size:clamp(18px,2.5vw,26px); line-height:1.55; background:#fff8e7; border:1px solid #f1dfac; border-radius:14px; padding:14px;}
    .ja.hidden{visibility:hidden;}
    .buttons{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px;}
    button, select{font-size:16px; border:none; border-radius:14px; padding:13px 12px; font-weight:800; cursor:pointer;}
    button{background:#eef3fb; color:var(--ink);}
    button.primary{background:var(--main); color:white;}
    button.green{background:var(--ok); color:white;}
    button:active{transform:translateY(1px)}
    .settings{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; color:var(--muted);}
    select{background:white; border:1px solid var(--line); color:var(--ink); min-width:220px; font-weight:600;}
    .list{margin-top:18px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:8px;}
    .item{border:1px solid var(--line); border-radius:12px; background:white; padding:10px; cursor:pointer; font-size:14px; line-height:1.35;}
    .item.active{border-color:var(--main); background:var(--soft);}
    .itemDone{color:var(--ok); font-weight:900; margin-right:4px;}
    .small{font-size:13px; color:var(--muted); margin-top:10px;}
    @media(max-width:680px){.buttons{grid-template-columns:repeat(2,1fr)} .sentenceBox{min-height:310px}}
  </style>
</head>
<body>
  <header>
    <h1>仮定法 音読練習</h1>
    <div class="sub">一文ずつ表示・和訳つき・英文読み上げ</div>
  </header>
  <main>
    <section class="panel">
      <div class="toprow">
        <div class="badge" id="counter">1 / 25</div>
        <div class="progressWrap"><div class="progress" id="progress"></div></div>
      </div>

      <div class="sentenceBox">
        <div class="label" id="typeLabel">問題</div>
        <div class="en" id="english"></div>
        <div class="ja" id="japanese"></div>
      </div>

      <div class="buttons">
        <button id="prevBtn">← 前へ</button>
        <button class="primary" id="speakBtn">▶ 音読</button>
        <button class="green" id="repeatBtn">🔁 3回</button>
        <button id="nextBtn">次へ →</button>
      </div>

      <div class="buttons">
        <button id="slowBtn">🐢 ゆっくり</button>
        <button id="hideJaBtn">和訳を隠す</button>
        <button id="doneBtn">できた ✓</button>
        <button id="shuffleBtn">ランダム</button>
      </div>

      <div class="settings">
        <label>Voice: <select id="voiceSelect"></select></label>
        <label>Speed: <select id="rateSelect">
          <option value="0.7">0.7 ゆっくり</option>
          <option value="0.85" selected>0.85 少しゆっくり</option>
          <option value="1">1.0 普通</option>
        </select></label>
      </div>
      <div class="small">スペースキー：音読　← →：前後移動</div>
    </section>
    <div class="list" id="list"></div>
  </main>

<script>
const sentences = [
  {type:'問題 1', en:"If I were you, I'd accept his offer.", ja:'もし私があなたなら、彼の申し出を受け入れるでしょう。'},
  {type:'問題 2', en:'If he had time, he could go with you.', ja:'もし彼に時間があれば、あなたと一緒に行けるのに。'},
  {type:'問題 3', en:'If I had caught the express train, I would have been in time for the meeting yesterday.', ja:'もし急行列車に乗れていたら、昨日の会議に間に合っていただろう。'},
  {type:'問題 4', en:'If I had been taller, I could have played volleyball in my high school.', ja:'もしもっと背が高かったら、高校でバレーボールができていただろう。'},
  {type:'問題 5', en:'If he had sold his house at that time, he would be rich now.', ja:'もし彼がその時家を売っていたら、今ごろ裕福だろう。'},
  {type:'問題 6', en:'If war were to break out in that country, what would you do?', ja:'もしその国で戦争が起こるようなことがあれば、あなたはどうしますか。'},
  {type:'問題 7', en:"If my husband should come, please tell him I've gone out.", ja:'万一私の夫が来たら、私は外出したと伝えてください。'},
  {type:'問題 8', en:"If it weren't for air, all living things would die.", ja:'もし空気がなければ、すべての生き物は死んでしまうだろう。'},
  {type:'問題 9', en:"If it had not been for Anna's help, we would have lost the game.", ja:'もしアンナの助けがなかったら、私たちはその試合に負けていただろう。'},
  {type:'問題 10', en:'Without their cooperation, Ethan could not have succeeded.', ja:'彼らの協力がなかったら、イーサンは成功できなかっただろう。'},
  {type:'問題 11', en:"Without Samantha's great effort, we could not have finished this project.", ja:'サマンサの大きな努力がなかったら、私たちはこのプロジェクトを終えられなかっただろう。'},
  {type:'問題 12', en:'Were I rich, I would buy a new house for my family.', ja:'もし私がお金持ちなら、家族のために新しい家を買うだろう。'},
  {type:'問題 13', en:'Had Mathew had more time, he would have done better.', ja:'もしマシューにもっと時間があったなら、彼はもっとうまくやっていただろう。'},
  {type:'問題 14', en:'Should it rain, the game would be cancelled.', ja:'万一雨が降れば、その試合は中止になるだろう。'},
  {type:'問題 15', en:'She calls her parents every day from London. Otherwise, they would worry about her.', ja:'彼女はロンドンから毎日両親に電話をします。そうでなければ、両親は彼女のことを心配するでしょう。'},
  {type:'問題 16', en:'I wish I knew how to explain the problem in English.', ja:'その問題を英語でどう説明すればよいか分かればいいのに。'},
  {type:'問題 17', en:'I wish I had been in time for the train.', ja:'その電車に間に合っていたらよかったのに。'},
  {type:'問題 18', en:'My closest friend Sally always talks to me as if we were sisters.', ja:'私の親友サリーは、まるで私たちが姉妹であるかのように、いつも私に話します。'},
  {type:'問題 19', en:'The girl talks about the king as if she had met him.', ja:'その女の子は、まるでその王様に会ったことがあるかのように話します。'},
  {type:'問題 20', en:"Hurry up! It's time we left.", ja:'急いで！もう私たちが出発する時間です。'},
  {type:'問題 21', en:'If only we had left ten minutes earlier!', ja:'10分早く出発してさえいればなあ。'},
  {type:'問題 22', en:"I'd rather you did it today.", ja:'私はむしろ、あなたに今日それをしてほしいです。'},
  {type:'Writing 1', en:'If I had had enough money, I would have bought a new car.', ja:'もし十分なお金があったなら、私は新しい車を買っていただろう。'},
  {type:'Writing 2', en:'If he had been promoted at that time, he would still be working for the same company.', ja:'もし彼がその時昇進していたら、今でも同じ会社で働いていただろう。'},
  {type:'Writing 3', en:'I wish I had more time and money.', ja:'もっと時間とお金があればいいのに。'},
{type:'問題 31', en:'If today were the last day of your life, what would you want to do?', ja:'もし今日があなたの人生最後の日なら、あなたは何をしたいですか。'},
  {type:'問題 32', en:"If we had caught the ten o'clock train, we would have been in time.", ja:'もし私たちが10時の電車に乗っていたら、間に合っていただろう。'},
  {type:'問題 33', en:"If you had read the notice more carefully, you wouldn't be in trouble now.", ja:'もしあなたがその掲示をもっと注意深く読んでいたら、今困ったことにはなっていないだろう。'},
  {type:'問題 34', en:'If Jeff were to lose his smartphone, he would start to panic.', ja:'もしジェフがスマートフォンをなくすようなことがあれば、彼はパニックになり始めるだろう。'},
  {type:'問題 35', en:'If it had not been for the traffic jam, I would have caught the flight to Osaka.', ja:'もし交通渋滞がなかったら、私は大阪行きの飛行機に乗れていただろう。'},
  {type:'問題 36', en:'Without your assistance, our project would have failed.', ja:'あなたの援助がなかったら、私たちのプロジェクトは失敗していただろう。'},
  {type:'問題 37', en:"Had I known his situation, I wouldn't have suggested the plan.", ja:'もし私が彼の状況を知っていたら、その計画は提案しなかっただろう。'},
  {type:'問題 38', en:'John must have been feeling sick; otherwise, he would have eaten the whole pizza.', ja:'ジョンは体調が悪かったに違いない。そうでなければ、ピザを丸ごと食べていただろう。'},
  {type:'問題 39', en:'I wish I had studied harder when I was a student.', ja:'学生だったときに、もっと一生懸命勉強していればよかったのに。'},
  {type:'問題 40', en:"Why is he talking to me as if he knew me? I've never seen him before.", ja:'なぜ彼は私を知っているかのように話しかけてくるのですか。私は彼に一度も会ったことがありません。'},
  {type:'問題 41', en:'Stop playing that video game. It is time you went to bed.', ja:'そのビデオゲームをやめなさい。もう寝る時間です。'}
];

let order = sentences.map((_,i)=>i);
let pos = 0;
let done = new Set(JSON.parse(localStorage.getItem('subjunctiveDone')||'[]'));
let voices = [];

const $ = id => document.getElementById(id);
function saveDone(){ localStorage.setItem('subjunctiveDone', JSON.stringify([...done])); }
function currentIndex(){ return order[pos]; }
function render(){
  const i = currentIndex(); const s = sentences[i];
  $('counter').textContent = `${pos+1} / ${sentences.length}`;
  $('progress').style.width = `${((pos+1)/sentences.length)*100}%`;
  $('typeLabel').textContent = s.type;
  $('english').textContent = s.en;
  $('japanese').textContent = s.ja;
  document.querySelectorAll('.item').forEach((el,k)=>{
    el.classList.toggle('active', k===pos);
    const idx = order[k];
    el.innerHTML = `${done.has(idx)?'<span class="itemDone">✓</span>':''}${sentences[idx].type}: ${sentences[idx].en}`;
  });
}
function buildList(){
  const list = $('list'); list.innerHTML='';
  order.forEach((idx,k)=>{
    const div = document.createElement('div'); div.className='item';
    div.onclick = ()=>{pos=k; render(); window.scrollTo({top:0,behavior:'smooth'});};
    list.appendChild(div);
  });
  render();
}
function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v=>v.lang && v.lang.toLowerCase().startsWith('en'));
  const sel = $('voiceSelect'); sel.innerHTML='';
  voices.forEach((v,i)=>{
    const opt=document.createElement('option'); opt.value=i; opt.textContent=`${v.name} (${v.lang})`; sel.appendChild(opt);
  });
}
function speak(rateOverride=null){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(sentences[currentIndex()].en);
  const vi = Number($('voiceSelect').value || 0);
  if(voices[vi]) u.voice = voices[vi];
  u.lang = voices[vi]?.lang || 'en-US';
  u.rate = rateOverride ?? Number($('rateSelect').value);
  u.pitch = 1;
  speechSynthesis.speak(u);
}
async function repeat(times=3){
  speechSynthesis.cancel();
  for(let i=0;i<times;i++){
    await new Promise(resolve=>{
      const u = new SpeechSynthesisUtterance(sentences[currentIndex()].en);
      const vi = Number($('voiceSelect').value || 0);
      if(voices[vi]) u.voice = voices[vi];
      u.lang = voices[vi]?.lang || 'en-US';
      u.rate = Number($('rateSelect').value);
      u.onend = ()=>setTimeout(resolve, 700);
      speechSynthesis.speak(u);
    });
  }
}
$('prevBtn').onclick=()=>{pos=(pos-1+order.length)%order.length; render();};
$('nextBtn').onclick=()=>{pos=(pos+1)%order.length; render();};
$('speakBtn').onclick=()=>speak();
$('slowBtn').onclick=()=>speak(0.65);
$('repeatBtn').onclick=()=>repeat(3);
$('hideJaBtn').onclick=()=>{
  $('japanese').classList.toggle('hidden');
  $('hideJaBtn').textContent = $('japanese').classList.contains('hidden') ? '和訳を表示' : '和訳を隠す';
};
$('doneBtn').onclick=()=>{ done.add(currentIndex()); saveDone(); render(); };
$('shuffleBtn').onclick=()=>{
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]];}
  pos=0; buildList();
};
document.addEventListener('keydown', e=>{
  if(e.code==='Space'){e.preventDefault(); speak();}
  if(e.key==='ArrowRight') $('nextBtn').click();
  if(e.key==='ArrowLeft') $('prevBtn').click();
});
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;
buildList();
</script>
</body>
</html>
